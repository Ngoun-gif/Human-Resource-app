server:
  port: 9999

spring:
  application:
    name: hr-management-system

  datasource:
    url: jdbc:postgresql://localhost:5432/postgres?currentSchema=hr_management
    username: postgres
    password:
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        "[format_sql]": true
        "[default_schema]": hr_management

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html

logging:
  level:
    root: INFO
    "[org.springframework.security]": DEBUG
    "[org.hibernate.SQL]": DEBUG
    "[org.hibernate.orm.jdbc.bind]": TRACE
  pattern:
    console: "%clr(%d{HH:mm:ss}){faint} %clr(%5p) %clr(%logger{36}){cyan} - %m%n"