
server:
  port: 9999

spring:
  application:
    name: hr-management-system
  
  jackson:
    time-zone: Asia/Phnom_Penh


  datasource:
    url: jdbc:postgresql://localhost:5432/postgres
    username: your_username
    password: your_password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        "[format_sql]": true
        "[default_schema]": public

  flyway:
    enabled: true
    baseline-on-migrate: false
    locations: classpath:db/migration
    default-schema: public
    schemas: public

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html

logging:
  level:
    root: INFO
    "[org.springframework.security]": DEBUG
    "[org.hibernate.SQL]": DEBUG
    "[org.hibernate.orm.jdbc.bind]": TRACE
  pattern:
    console: "%clr(%d{HH:mm:ss}){faint} %clr(%5p) %clr(%logger{36}){cyan} - %m%n"

google:
  credentials:
    path: google/credentials.json
  drive:
    folder-id: 1E6KTxTn_V0-dv1NXXU0JIvVB2_lxxxxxxx